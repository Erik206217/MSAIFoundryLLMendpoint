name: Deploy And Verify

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  RG: Chatbot-rg
  APP: chatbotformax
  ACR: ca379bc9774eacr
  REPO: chatbotformax

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        shell: bash
        run: |
          set -euo pipefail
          TAG="sha-${GITHUB_SHA::7}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          az acr build -r "${ACR}" \
            -t "${REPO}:${TAG}" \
            -t "${REPO}:latest" \
            .

      - name: Update Container App
        shell: bash
        run: |
          set -euo pipefail
          REV_SUFFIX="$(echo "${TAG}" | tr -cd 'a-z0-9-')"
          az containerapp update \
            -n "${APP}" \
            -g "${RG}" \
            --image "${ACR}.azurecr.io/${REPO}:${TAG}" \
            --revision-suffix "${REV_SUFFIX}"

      - name: Verify app availability
        shell: bash
        run: |
          set -euo pipefail
          URL="$(az containerapp show -n "${APP}" -g "${RG}" --query "properties.configuration.ingress.fqdn" -o tsv)"
          if [[ -z "${URL}" ]]; then
            echo "Ingress URL not found."
            exit 1
          fi
          TARGET="https://${URL}"
          echo "Checking ${TARGET}"
          for i in {1..10}; do
            code="$(curl -sS -o /tmp/max_probe.html -w "%{http_code}" "${TARGET}" || true)"
            if [[ "${code}" == "200" ]]; then
              echo "PASS: HTTP 200"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${code}; retrying in 12s"
            sleep 12
          done
          echo "FAIL: service not healthy in expected window."
          exit 2
